name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, for example v0.1.0
        required: true
        type: string

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: tuneweave
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: tuneweave.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: tuneweave
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: tuneweave
    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Install Rust target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: >-
          cargo build --release --locked
          --package tuneweave-server --bin tuneweave
          --target ${{ matrix.target }}

      - name: Package release archive
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          BINARY: ${{ matrix.binary }}
        run: |
          set -euo pipefail
          archive="tuneweave-${TARGET}.tar.gz"
          mkdir -p package dist
          cp "target/${TARGET}/release/${BINARY}" package/
          cp LICENSE LICENSE-APACHE LICENSE-MIT README.md THIRD_PARTY_NOTICES.md package/
          tar -czf "dist/${archive}" -C package .

      - name: Upload release archive
        uses: actions/upload-artifact@v7
        with:
          name: tuneweave-${{ matrix.target }}
          path: dist/*.tar.gz
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release archives
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: tuneweave-*
          merge-multiple: true

      - name: Validate release tag
        id: release
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          DISPATCH_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [[ "${EVENT_NAME}" == "push" ]]; then
            tag="${REF_NAME}"
          else
            tag="${DISPATCH_TAG}"
          fi
          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag must look like v1.2.3 or v1.2.3-rc.1" >&2
            exit 1
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Create or update release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          if gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${TAG}" dist/* --clobber --repo "${GITHUB_REPOSITORY}"
          else
            gh release create "${TAG}" dist/* \
              --repo "${GITHUB_REPOSITORY}" \
              --target "${GITHUB_SHA}" \
              --title "${TAG}" \
              --generate-notes
          fi
